<body class="flex items-center justify-center min-h-screen p-margin-mobile md:p-margin-desktop font-body-md text-on-background">
<!-- Ambient Background Orbs -->
<div class="ambient-glow top-[-10%] left-[-10%]"></div>
<div class="ambient-glow bottom-[-10%] right-[-10%]"></div>
<main class="w-full max-w-[480px] z-10">
<!-- Transactional Screen: Navigation suppressed as per Shell Visibility Rule -->
<div class="glass-card rounded-xl p-stack-md md:p-stack-lg flex flex-col items-center">
<!-- Brand Logo & Identity -->
<div class="flex flex-col items-center gap-stack-sm mb-stack-lg">
<div class="w-16 h-16 rounded-full bg-gradient-to-tr from-primary to-secondary flex items-center justify-center shadow-lg shadow-primary/20 mb-stack-xs">
<span class="material-symbols-outlined text-white text-[32px]">bubble_chart</span>
</div>
<h1 class="font-headline-lg text-headline-lg font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">AI Job Apply</h1>
<h2 class="font-headline-sm text-on-surface text-center opacity-90">Welcome Back</h2>
</div>
<!-- Login Form -->
<form class="w-full space-y-stack-md" onsubmit="event.preventDefault()">
<!-- Email Field -->
<div class="space-y-stack-xs">
<label class="font-label-sm text-on-surface-variant block ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-container-low/40 border border-white/10 rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all backdrop-blur-md" id="email" placeholder="alex@career.ai" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-stack-xs">
<div class="flex justify-between items-center px-1">
<label class="font-label-sm text-on-surface-variant block" for="password">Password</label>
<a class="font-label-sm text-primary hover:text-secondary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-low/40 border border-white/10 rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all backdrop-blur-md" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full btn-gradient py-4 rounded-lg font-label-md text-white flex items-center justify-center gap-2 mt-stack-md group" type="submit">
<span class="font-bold">Sign In</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="w-full flex items-center gap-gutter my-stack-lg">
<div class="h-[1px] flex-grow bg-white/5"></div>
<span class="font-label-sm text-on-tertiary-fixed-variant uppercase tracking-widest">or continue with</span>
<div class="h-[1px] flex-grow bg-white/5"></div>
</div>
<!-- SSO Option -->
<button class="w-full bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg py-4 px-4 flex items-center justify-center gap-3 transition-all active:scale-[0.98]">

<span class="font-label-md text-on-surface">Sign in with Google</span>
</button>
<!-- Bottom Navigation -->
<div class="mt-stack-lg text-center">
<p class="font-label-md text-on-surface-variant">
          Don't have an account? 
          <a class="text-primary font-bold hover:text-secondary transition-colors underline-offset-4 hover:underline" href="#">Create an Account</a>
</p>

<footer class="mt-stack-md flex flex-wrap justify-center gap-gutter px-4 opacity-50 hover:opacity-100 transition-opacity">
<a class="font-label-sm text-on-surface hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-sm text-on-surface hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-sm text-on-surface hover:text-primary transition-colors" href="#">AI Ethics</a>
</footer>
</main>
<!-- Interactive Atmosphere Background -->

<script>
    // Micro-interaction for input fields focus
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.parentElement.classList.add('scale-[1.01]');
        input.parentElement.parentElement.classList.add('transition-transform');
      });
      input.addEventListener('blur', () => {
        input.parentElement.parentElement.classList.remove('scale-[1.01]');
      });
    });

    // Subtle parallax effect on the glass card
    document.addEventListener('mousemove', (e) => {
      const card = document.querySelector('.glass-card');
      const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
      card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });
  </script>
