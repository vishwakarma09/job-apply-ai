<style>

            outline: none;
        }

<body class="bg-background text-on-background min-h-screen font-body-md aura-bg flex flex-col">
<!-- Top AppBar (From Shared Components) -->
<header class="fixed top-0 w-full bg-background/80 backdrop-blur-3xl border-b border-white/10 shadow-[0_20px_40px_rgba(99,102,241,0.1)] z-50">
<div class="flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16 max-w-container-max mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary font-headline-lg" data-icon="auto_awesome">auto_awesome</span>
<span class="font-headline-lg text-headline-lg-mobile md:text-headline-lg font-bold text-primary">AI Job Apply</span>
</div>
<nav class="hidden md:flex gap-gutter">
<a class="text-on-surface-variant hover:opacity-80 transition-opacity font-label-md text-label-md" href="#">Features</a>
<a class="text-on-surface-variant hover:opacity-80 transition-opacity font-label-md text-label-md" href="#">Pricing</a>
<a class="text-on-surface-variant hover:opacity-80 transition-opacity font-label-md text-label-md" href="#">Sign In</a>
</nav>
</div>
</header>
<!-- Main Registration Section -->
<main class="flex-grow flex items-center justify-center pt-24 pb-32 px-margin-mobile">
<!-- Background Aura Effects -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary-container/10 blur-[120px]"></div>
</div>
<div class="glass-card w-full max-w-[480px] p-8 md:p-12 rounded-3xl relative z-10">
<!-- Header Text -->
<div class="text-center mb-stack-md">
<h1 class="font-headline-xl text-headline-xl text-on-surface mb-2">Create Account</h1>
<p class="text-on-surface-variant font-body-md text-body-md">Join thousands of professionals using AI to land their dream job.</p>
</div>
<!-- Form -->
<form class="space-y-stack-md" onsubmit="event.preventDefault();">
<!-- Full Name -->
<div class="space-y-stack-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="glass-input w-full pl-12 pr-4 py-3 rounded-xl text-on-surface placeholder:text-outline-variant font-body-md" id="name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Address -->
<div class="space-y-stack-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="glass-input w-full pl-12 pr-4 py-3 rounded-xl text-on-surface placeholder:text-outline-variant font-body-md" id="email" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Password Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="space-y-stack-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="glass-input w-full pl-12 pr-4 py-3 rounded-xl text-on-surface placeholder:text-outline-variant font-body-md" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="space-y-stack-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="confirm_password">Confirm</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="shield">shield</span>
<input class="glass-input w-full pl-12 pr-4 py-3 rounded-xl text-on-surface placeholder:text-outline-variant font-body-md" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Register CTA -->
<button class="btn-gradient w-full py-4 rounded-xl font-headline-lg text-headline-lg-mobile text-white font-bold flex items-center justify-center gap-2 group">
                    Register
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-4 py-stack-sm">
<div class="h-[1px] flex-grow bg-white/10"></div>
<span class="text-outline font-label-sm text-label-sm uppercase tracking-widest">or continue with</span>
<div class="h-[1px] flex-grow bg-white/10"></div>
</div>
<!-- Google SSO -->
<button class="glass-card w-full py-3 rounded-xl flex items-center justify-center gap-3 hover:bg-white/10 transition-colors">

<path d="M12.2401 24.0008C15.4766 24.0008 18.2059 22.9382 20.1945 21.1039L16.3275 18.1055C15.2517 18.8375 13.8627 19.252 12.2445 19.252C9.11388 19.252 6.45946 17.1399 5.50705 14.3003H1.5166V17.3912C3.55371 21.4434 7.7029 24.0008 12.2401 24.0008Z" fill="#34A853"></path>
<path d="M5.50254 14.3003C5.25206 13.5533 5.11417 12.76 5.11417 11.9405C5.11417 11.121 5.25206 10.3277 5.50254 9.58066V6.48975H1.51659C0.662582 8.1283 0.174316 9.9818 0.174316 11.9405C0.174316 13.8992 0.662582 15.7527 1.51659 17.3912L5.50254 14.3003Z" fill="#FBBC05"></path>
<path d="M12.2401 4.74966C14.0074 4.74966 15.5951 5.35626 16.8407 6.54867L20.2693 3.12006C18.1971 1.1911 15.4678 0 12.2401 0C7.7029 0 3.55371 2.55743 1.5166 6.60959L5.50254 9.7005C6.45065 6.86091 9.10947 4.74966 12.2401 4.74966Z" fill="#EA4335"></path>
</svg>
<span class="font-label-md text-label-md text-on-surface">Sign up with Google</span>
</button>
</form>

<div class="mt-8 text-center">
<p class="text-on-surface-variant font-body-md text-body-md">

</p>

<nav class="md:hidden fixed bottom-0 w-full bg-background/80 backdrop-blur-3xl border-t border-white/10 shadow-[0_-10px_30px_rgba(99,102,241,0.05)] z-50 flex justify-around py-2">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors scale-95 active:scale-90 transition-transform" href="#">

<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
<span class="font-label-sm text-label-sm">Register</span>

<img class="w-full h-full object-cover" data-alt="A professional young entrepreneur in a futuristic high-tech workspace with glowing holographic interfaces showing job search data. The atmosphere is sophisticated and intelligent, bathed in deep obsidian shadows and vibrant indigo light leaks. The style is a hyper-realistic digital photograph with sharp focus, premium aesthetic, and clean cinematic lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvNe41bE8vhMBSIzMObcUO9aXmyLhGRq3DFDCpqzNpZ3EtkKggvlzhQLLzQA1ky4MiaH9t9aL-WtJURliO1pfDBpoOWamN8YPmm3vm6RKsclUAYv10ZMnHRQhvA9lHKR-arUI8THPkY7hgLVplpccT5ogK_69kNmzAFm0sYqAjU9GJyIg0VyLSlxE-0VGC4lqEFMnwFdCGO-pk7XYOc3pa2BLJK-unhE94cwq7eK2aFJ5jRx9g-DCjFoCHanMUbEBPTIBRQLr1gbo"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
</div>
<!-- Floating Chips for Micro-Interactions -->
<div class="absolute -top-4 -left-8 glass-card px-4 py-2 rounded-full flex items-center gap-2 animate-bounce duration-[3000ms]">
<span class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_#c0c1ff]"></span>
<span class="text-label-sm font-label-sm text-on-surface">AI Optimized</span>
</div>
<div class="absolute bottom-12 -right-4 glass-card px-4 py-2 rounded-full flex items-center gap-2 animate-pulse">
<span class="material-symbols-outlined text-primary text-sm" data-icon="auto_fix_high">auto_fix_high</span>
<span class="text-label-sm font-label-sm text-on-surface">Magic Apply Active</span>
</div>
</div>
<!-- Micro-interaction Scripts -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.glass-input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.querySelector('.material-symbols-outlined').style.color = '#c0c1ff';
                });
                input.addEventListener('blur', () => {
                    input.parentElement.querySelector('.material-symbols-outlined').style.color = '#908fa0';
                });
            });
        });
    </script>
</body></html>
