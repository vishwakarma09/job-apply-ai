<!-- Micro-interactions Script -->
<script>
        function handleReset(e) {
            e.preventDefault();
            const toast = document.getElementById('successToast');
            toast.classList.remove('hidden');
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Sending...';
            btn.disabled = true;
            btn.style.opacity = '0.7';

            setTimeout(() => {
                btn.innerHTML = 'Email Sent';
                btn.classList.replace('primary-gradient', 'bg-surface-container-highest');
                
                // Hide toast after 5 seconds
                setTimeout(() => {
                    hideToast();
                }, 5000);
            }, 1500);
        }

        function hideToast() {
            const toast = document.getElementById('successToast');
            toast.style.opacity = '0';
            toast.style.transform = 'translate(-50%, -200%)';
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.style.opacity = '';
                toast.style.transform = '';
            }, 500);
        }
    </script>
