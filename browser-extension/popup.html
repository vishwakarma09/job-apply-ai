<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 340px;
      background: linear-gradient(135deg, #0a0a0f 0%, #121224 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #ffffff;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Glassmorphic Container */
    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 12px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: #fff;
      font-size: 14px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .logo-text {
      font-weight: 800;
      font-size: 16px;
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Version */
    .version {
      font-size: 10px;
      color: #5b5a6c;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.03);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Status Card */
    .card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-label {
      font-size: 11px;
      color: #908fa0;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .badge.connected {
      background: rgba(16, 185, 129, 0.08);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .badge.disconnected {
      background: rgba(239, 68, 68, 0.08);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: currentColor;
      box-shadow: 0 0 8px currentColor;
    }

    /* Detail Row */
    .info-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .info-label {
      font-size: 10px;
      color: #5b5a6c;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .info-value {
      font-size: 13px;
      font-weight: 500;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Buttons */
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.5);
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: none;
    }

    .btn.secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: none;
    }

    /* Settings section */
    .settings-panel {
      display: none;
      flex-direction: column;
      gap: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 14px;
      margin-top: 4px;
    }

    .settings-panel.open {
      display: flex;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 10px;
      color: #908fa0;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 8px 12px;
      color: #a5b4fc;
      font-size: 12px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: #6366f1;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: #5b5a6c;
      margin-top: 8px;
    }

    .footer a {
      color: #818cf8;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: #a5b4fc;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo-container">
        <div class="logo-icon">AI</div>
        <span class="logo-text">AI Job Apply</span>
      </div>
      <span class="version">v1.0</span>
    </div>

    <!-- Connection Card -->
    <div class="card">
      <div class="status-row">
        <span class="status-label">API Connection</span>
        <div id="status-badge" class="badge disconnected">
          <span class="status-dot"></span>
          <span id="status-text">Checking...</span>
        </div>
      </div>

      <!-- User Detail -->
      <div class="info-group">
        <span class="info-label">User Account</span>
        <span id="user-email" class="info-value">Disconnected</span>
      </div>

      <!-- Active Profile -->
      <div class="info-group">
        <span class="info-label">Active Profile</span>
        <span id="active-profile" class="info-value">-</span>
      </div>

      <!-- Active Resume -->
      <div class="info-group">
        <span class="info-label">Active Resume</span>
        <span id="active-resume" class="info-value">-</span>
      </div>
    </div>

    <!-- Action Button -->
    <button id="btn-dashboard" class="btn">
      Open Dashboard
    </button>

    <!-- Settings Toggle -->
    <button id="btn-settings-toggle" class="btn secondary">
      Settings
    </button>

    <!-- Settings Drawer -->
    <div id="settings-panel" class="settings-panel">
      <div class="form-group">
        <span class="form-label">Backend API URL</span>
        <input type="text" id="input-api-url" class="form-input" placeholder="http://localhost:8000">
      </div>
      <div class="form-group">
        <span class="form-label">Authentication Token</span>
        <input type="password" id="input-token" class="form-input" placeholder="Bearer JWT Token...">
      </div>
      <button id="btn-save-settings" class="btn">
        Save Settings
      </button>
    </div>

    <!-- Footer -->
    <div class="footer">
      Automating applications seamlessly.
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
