version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: job-apply-postgres
    restart: always
    environment:
      POSTGRES_USER: ai_job_apply_user
      POSTGRES_PASSWORD: ai_job_apply_password
      POSTGRES_DB: ai_job_apply_db
    ports:
      - "5432:5432"
    volumes:
      - job_apply_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: job-apply-redis
    restart: always
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    container_name: job-apply-mailpit
    restart: always
    ports:
      - "18025:8025"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: job-apply-backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://ai_job_apply_user:ai_job_apply_password@postgres:5432/ai_job_apply_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-YOUR_CEREBRAS_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-YOUR_GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-YOUR_GOOGLE_CLIENT_SECRET}
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    depends_on:
      - postgres
      - redis
      - mailpit

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: job-apply-frontend
    restart: always
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  job_apply_postgres_data:
